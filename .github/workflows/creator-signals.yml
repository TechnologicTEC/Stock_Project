name: Creator Signals (scan creators)

# Every 6 hours: poll each creator's YouTube feed, transcribe new videos, extract
# the stocks discussed, screen them, and store the results for the Creator
# Signals page. See scripts/scan_creators.py.
#
# NOTE: this is the run that proves whether transcript fetching survives a
# GitHub Actions (datacenter) IP — watch the logs for transcript_status=blocked.

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours, on the hour (UTC)
  workflow_dispatch: {}      # manual "Run workflow" button

concurrency: creator-signals   # never overlap runs

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-signals.txt
      - name: Scan creators + screen mentions
        env:
          DATABASE_URL: ${{ secrets.WARM_DATABASE_URL }}
          PRICE_HISTORY_PREFER_ALPACA: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}       # LLM extraction (dictionary fallback without it)
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}   # SEC ticker list fetch (has a default UA otherwise)
          # YouTube blocks its caption endpoint from datacenter IPs. Supadata fetches
          # server-side, so this is what makes the cloud run work. mode=native (the
          # default) costs 1 credit/transcript; SUPADATA_MODE=auto adds AI fallback
          # at 2 credits PER MINUTE — don't set it unless you mean to.
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          SUPADATA_MODE: ${{ vars.SUPADATA_MODE }}
          # Official Data API for the video list + channel lookup (free: 10,000
          # quota units/day, we use ~8). Without it we fall back to the unofficial
          # RSS feed, which throttles hard (404/500) and fails whole runs.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Alternative to Supadata: a residential proxy for the direct fetch.
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
          YT_PROXY_URL: ${{ secrets.YT_PROXY_URL }}
          # Digest email — set EITHER Resend or SMTP. Set neither and the email is
          # silently skipped (the scan still runs). See engine/mailer.py.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}     # else falls back to OWNER_EMAILS
          OWNER_EMAILS: ${{ secrets.OWNER_EMAILS }}
        run: python scripts/scan_creators.py
