# "Honest terminal" theme — dark blue-ink ground with a single amber accent
# (terminal heritage, deliberately not the near-black + acid-green cliché).
# This sets Streamlit's base tokens; app/_theme.py layers the rest via CSS
# (monospace data, panel-style metric cards, sidebar nav, badges, etc).
[theme]
# LIGHT canvas with a DARK shell: the body is light (long reading sessions on a
# dark ground are tiring), while the sidebar and top bar stay dark and frame it —
# app/_theme.py restates those in shell tokens, because Streamlit paints the
# sidebar with secondaryBackgroundColor and that has to stay light for inputs.
base = "light"
primaryColor = "#e8b24a"              # amber fill; carries dark ink, never white (9.61 vs 1.93)
backgroundColor = "#f6f7f9"
secondaryBackgroundColor = "#eef1f5"  # inputs, code, table headers
textColor = "#18202b"
linkColor = "#8a5f0f"                 # amber darkened until it passes AA on white
borderColor = "#e3e7ed"
baseRadius = "0.45rem"
font = "sans-serif"                   # system UI sans; data is forced to monospace in CSS
